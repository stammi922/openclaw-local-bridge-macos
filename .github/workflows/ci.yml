name: CI
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit-and-integ:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build
      - run: npm test

  e2e:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: echo "E2E requires a live Claude Max session; see test/e2e.sh"
